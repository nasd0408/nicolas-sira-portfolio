<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080b10">
  <meta name="robots" content="noindex">
  <title>404 — Nicolás Sira</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root { --bg:#080b10; --ink:#f1f3ec; --muted:#9ca5ae; --acid:#adff3f; --blue:#7657ff; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      display: grid; place-content: center; text-align: center; padding: 40px;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ""; position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(600px circle at 80% 0%, rgba(118,87,255,.18), transparent 60%),
        radial-gradient(500px circle at 0% 100%, rgba(173,255,63,.12), transparent 60%);
    }
    .wrap { position: relative; z-index: 1; max-width: 520px; }
    .code {
      font-size: clamp(90px, 22vw, 200px); font-weight: 800; line-height: .9;
      letter-spacing: -.04em; margin: 0;
      background: linear-gradient(90deg, var(--acid), var(--blue));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h1 { font-size: clamp(20px, 5vw, 30px); margin: 18px 0 10px; letter-spacing: -.02em; }
    p { color: var(--muted); margin: 0 0 30px; line-height: 1.5; }
    a {
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
      padding: 13px 24px; border-radius: 999px; background: var(--acid); color: #080b10;
      font-weight: 600; transition: transform .2s ease;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="code">404</p>
    <h1>That page ran off.</h1>
    <p>The route you followed doesn't exist here — but the system that runs the business still does.</p>
    <a href="https://nasd0408.github.io/nicolas-sira-portfolio/">← Back to portfolio</a>
  </div>
</body>
</html>
